<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#100a1f">
  <title>El impostor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <section class="game-intro"><p class="eyebrow">Juego 08</p><h1>El impostor</h1><p></p></section>
    <section class="game-content">
      <textarea id="impostor-nombres" class="game-textarea" rows="3" placeholder="Nombres separados por coma" aria-label="Nombres de jugadores"></textarea>
      <div class="impostor-options">
        <select id="impostor-categoria" aria-label="Categoría">
          <option value="carrete">Carrete</option>
          <option value="cuerpo">Cuerpo</option>
          <option value="lugares">Lugares</option>
          <option value="cultura">Cultura</option>
          <option value="citas_y_travesuras">Citas y travesuras</option>
          <option value="comida_y_bajon">Comida y bajón</option>
          <option value="excusas_y_mentiras">Excusas y mentiras</option>
        </select>
        <input id="impostor-tiempo" type="number" value="60" min="15" max="300" aria-label="Segundos">
      </div>
      <button class="action-btn impostor-start" type="button" onclick="iniciarImpostor()">Empezar</button>
      <div id="impostor-stage" class="impostor-stage" hidden>
        <div id="impostor-turno" class="turn-card"></div>
        <div id="impostor-palabra" class="resultado impostor-word"></div>
        <button id="impostor-revelar" class="action-btn" type="button" onclick="revelarPalabraImpostor()">Ver palabra</button>
        <button id="impostor-siguiente" class="action-btn" type="button" onclick="siguienteJugadorImpostor()" hidden>Siguiente</button>
        <div id="impostor-timer" class="timer" hidden>01:00</div>
      </div>
    </section>
    <div class="back-menu"><a href="index.html" class="back-btn">← Volver a los juegos</a></div>
  </main>
  <footer class="site-footer"><a class="instagram-link" href="https://www.instagram.com/tdawsonb_/" target="_blank" rel="noopener noreferrer" aria-label="Instagram de tdawsonb_"><svg class="instagram-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"></rect><circle cx="12" cy="12" r="4"></circle><path d="M17.5 6.5h.01"></path></svg>@tdawsonb_</a></footer>
  <script src="script.js"></script>
</body>
</html>
