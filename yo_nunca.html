<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#100a1f">
  <title>Yo nunca · Después de las 12</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header"><a class="brand" href="index.html"><span class="brand-mark">✦</span> Después de las 12</a><a class="header-link" href="index.html">← Juegos</a></header>
  <main class="game-shell">
    <section class="game-intro"><p class="eyebrow">Juego 01</p><h1>Yo nunca</h1><p>Una frase honesta puede abrir una gran historia.</p></section>
    <section class="game-content">
      <p>Escribe un número del 1 al 350, o deja el 0 para sorprenderte.</p>
      <div class="number-form"><input type="number" id="numero-input" min="0" max="350" value="0" placeholder="0 — aleatorio" aria-label="Número de frase"><button class="action-btn" type="button" onclick="yoNunca(document.getElementById('numero-input').value)">Mostrar frase</button></div>
      <div id="frase-resultado" class="resultado" aria-live="polite"></div>
    </section>
    <div class="back-menu"><a href="index.html" class="back-btn">← Volver a los juegos</a></div>
  </main>
  <script src="script.js"></script>
